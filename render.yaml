# SPDX-License-Identifier: Apache-2.0
# Free-tier deployable. SQLite lives on the container's ephemeral filesystem,
# which is fine for a live demo. For durable storage across restarts/redeploys,
# add a persistent disk (paid plan):
#   disk:
#     name: data
#     mountPath: /app/data
#     sizeGB: 1
services:
  - type: web
    name: agentfacts-registry
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: AGENTFACTS_DB
        value: /app/data/agentfacts.db
      - key: AGENTFACTS_SKILL_PATH
        value: /app/SKILL.md
      - key: AGENTFACTS_SEED
        value: "1"
